<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillaz — Рейтинг</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; color: white; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .search-box {
            background: white;
            border-radius: 30px;
            padding: 12px 20px;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            text-align: center;
        }
        .stat-card h3 { font-size: 2rem; color: #667eea; }
        .table-container {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #667eea; color: white; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f5f5f5; }
        .rank-1 { background: #ffd700; color: #333; font-weight: bold; }
        .rank-2 { background: #c0c0c0; color: #333; font-weight: bold; }
        .rank-3 { background: #cd7f32; color: white; font-weight: bold; }
        .loading, .error { text-align: center; padding: 50px; color: white; }
        .error { color: #ff6b6b; }
        .footer { text-align: center; margin-top: 30px; color: white; opacity: 0.7; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 GORILLAZ — Рейтинг</h1>
            <p>Система подсчёта баллов</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск игрока...">
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3 id="totalPlayers">—</h3><p>Всего игроков</p></div>
            <div class="stat-card"><h3 id="topScore">—</h3><p>Максимум баллов</p></div>
            <div class="stat-card"><h3 id="avgScore">—</h3><p>Средний балл</p></div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">🔄 Загрузка...</div>
            <div id="errorMsg" class="error" style="display:none;"></div>
            <table id="ratingTable" style="display:none;">
                <thead><tr><th>🏆 Место</th><th>👤 Игрок</th><th>⭐ Баллы</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            <button onclick="loadData()">🔄 Обновить</button>
        </div>
    </div>

    <script>
        // ВАШ ID ТАБЛИЦЫ
        const SHEET_ID = '11G7D8K9N8HqHJ0l6uLzzzbQCeUrG1FmS9trZ5Blp7n4';
        
        // ПРЯМАЯ ССЫЛКА НА CSV (должна работать после публикации)
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1778513716`;
        
        let players = [];
        
        async function loadData() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('ratingTable');
            const errorMsg = document.getElementById('errorMsg');
            
            loading.style.display = 'block';
            loading.innerHTML = '🔄 Загрузка...';
            table.style.display = 'none';
            errorMsg.style.display = 'none';
            
            try {
                // Пробуем загрузить CSV
                const response = await fetch(CSV_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const text = await response.text();
                console.log('CSV длина:', text.length);
                
                // Разбираем CSV
                const lines = text.split('\n');
                if (lines.length < 2) {
                    throw new Error('Нет данных');
                }
                
                // Ищем данные в колонках G и H (Игрок и Баллы)
                const playerScores = {};
                
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    
                    // Простой парсинг CSV
                    const cells = [];
                    let current = '';
                    let inQuotes = false;
                    
                    for (let j = 0; j < line.length; j++) {
                        const char = line[j];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            cells.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    cells.push(current.trim());
                    
                    // Убираем кавычки
                    for (let k = 0; k < cells.length; k++) {
                        cells[k] = cells[k].replace(/^"|"$/g, '');
                    }
                    
                    // Ищем колонки (по позиции, так как заголовки могут быть разными)
                    // Обычно колонка G (индекс 6) — Игрок, колонка H (индекс 7) — Баллы
                    let name = null;
                    let score = null;
                    
                    // Пробуем найти имя (текст, не число)
                    for (let k = 0; k < cells.length; k++) {
                        const val = cells[k];
                        if (val && val !== '' && isNaN(parseFloat(val))) {
                            // Это текст — вероятно имя
                            if (val !== 'Игрок' && val !== 'Ник игрока' && val !== '🏆 Игрок') {
                                name = val;
                                break;
                            }
                        }
                    }
                    
                    // Пробуем найти баллы (число)
                    for (let k = 0; k < cells.length; k++) {
                        const val = cells[k];
                        if (val && val !== '' && !isNaN(parseFloat(val))) {
                            const num = parseFloat(val);
                            if (!isNaN(num)) {
                                score = num;
                                break;
                            }
                        }
                    }
                    
                    if (name && score !== null && !isNaN(score)) {
                        if (playerScores[name]) {
                            playerScores[name] += score;
                        } else {
                            playerScores[name] = score;
                        }
                    }
                }
                
                // Преобразуем в массив и сортируем
                players = Object.entries(playerScores).map(([n, s]) => ({ name: n, score: s }));
                players.sort((a, b) => b.score - a.score);
                
                console.log('Найдено игроков:', players.length);
                
                if (players.length === 0) {
                    throw new Error('Не найдено игроков. Проверьте, что в таблице есть данные.');
                }
                
                // Отображаем
                renderTable();
                updateStats();
                
                loading.style.display = 'none';
                table.style.display = 'table';
                
            } catch (error) {
                console.error('Ошибка:', error);
                loading.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = `
                    ❌ Ошибка: ${error.message}<br><br>
                    <strong>Сделайте следующее:</strong><br><br>
                    1️⃣ Откройте <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank">вашу таблицу</a><br>
                    2️⃣ Нажмите <strong>Файл → Опубликовать в интернете</strong><br>
                    3️⃣ Нажмите <strong>"Опубликовать"</strong><br>
                    4️⃣ Обновите эту страницу через 1 минуту
                `;
            }
        }
        
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = players;
            
            if (searchTerm) {
                filtered = players.filter(p => p.name.toLowerCase().includes(searchTerm));
            }
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            for (let i = 0; i < filtered.length; i++) {
                const p = filtered[i];
                const row = tbody.insertRow();
                let rankClass = '';
                if (i === 0) rankClass = 'rank-1';
                else if (i === 1) rankClass = 'rank-2';
                else if (i === 2) rankClass = 'rank-3';
                
                row.innerHTML = `
                    <td class="${rankClass}" style="text-align:center; font-weight:bold;">${i+1}</td>
                    <td>${escapeHtml(p.name)}</td>
                    <td style="font-weight:bold; color:#667eea;">${p.score}</td>
                `;
            }
        }
        
        function updateStats() {
            document.getElementById('totalPlayers').innerText = players.length;
            document.getElementById('topScore').innerText = players.length > 0 ? players[0].score : 0;
            const avg = players.length > 0 ? (players.reduce((a,b) => a + b.score, 0) / players.length).toFixed(1) : 0;
            document.getElementById('avgScore').innerText = avg;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', () => renderTable());
        
        loadData();
    </script>
</body>
</html>
