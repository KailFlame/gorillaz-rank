<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillaz — Рейтинг гильдии</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.85;
        }

        .controls {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            min-width: 140px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .table-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9ff;
        }

        .rank-1 {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            color: #333;
            font-weight: bold;
        }
        .rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #a8a8a8);
            color: #333;
            font-weight: bold;
        }
        .rank-3 {
            background: linear-gradient(135deg, #cd7f32, #b86b2a);
            color: white;
            font-weight: bold;
        }

        .loading, .error {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2rem;
        }
        .error { color: #ff6b6b; }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            opacity: 0.7;
            font-size: 0.85rem;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 GORILLAZ — Рейтинг гильдии</h1>
            <p>Система подсчёта баллов</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск игрока...">
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3 id="totalPlayers">—</h3><p>Всего игроков</p></div>
            <div class="stat-card"><h3 id="topScore">—</h3><p>Максимум баллов</p></div>
            <div class="stat-card"><h3 id="avgScore">—</h3><p>Средний балл</p></div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">🔄 Загрузка данных...</div>
            <div id="errorMessage" class="error" style="display:none;"></div>
            <table id="ratingTable" style="display: none;">
                <thead>
                    <tr>
                        <th>🏆 Место</th>
                        <th>👤 Игрок</th>
                        <th>⭐ Баллы</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            📅 Последнее обновление: <span id="updateTime">—</span><br>
            <button onclick="loadData()">🔄 Обновить вручную</button>
        </div>
    </div>

    <script>
        // ⚠️ ВСТАВЬТЕ ВАШ API URL ОТ SHEET.BEST
        // Пример: const API_URL = 'https://sheet.best/api/sheets/ваш_ключ';
        const API_URL = 'https://api.sheetbest.com/sheets/59aa28de-6f32-4c46-9e6e-13ac25ee9eca';
        
        let players = [];
        
        async function loadData() {
            const loadingEl = document.getElementById('loading');
            const tableEl = document.getElementById('ratingTable');
            const errorEl = document.getElementById('errorMessage');
            
            loadingEl.style.display = 'block';
            loadingEl.innerHTML = '🔄 Загрузка данных...';
            tableEl.style.display = 'none';
            errorEl.style.display = 'none';
            
            if (!API_URL || API_URL === 'ВАШ_API_URL_СЮДА') {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.innerHTML = `
                    ❌ API не настроен.<br><br>
                    <strong>Сделайте следующее:</strong><br><br>
                    1️⃣ Зарегистрируйтесь на <a href="https://sheet.best" target="_blank">sheet.best</a><br>
                    2️⃣ Подключите вашу таблицу<br>
                    3️⃣ Скопируйте API URL и вставьте его в код вместо ВАШ_API_URL<br>
                    4️⃣ Загрузите сайт заново
                `;
                return;
            }
            
            try {
                console.log('Загрузка из API:', API_URL);
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Получено данных:', data.length);
                
                if (data.length === 0) {
                    throw new Error('Нет данных в таблице');
                }
                
                // Собираем баллы по игрокам
                const playerScores = {};
                
                for (const row of data) {
                    // Ищем колонки с игроком и баллами
                    let name = row['Игрок'] || row['Ник игрока'] || row['🏆 Игрок'];
                    let score = parseFloat(row['Баллы'] || row['⭐ Баллы'] || row['score']);
                    
                    if (!name) {
                        // Пробуем найти любую текстовую колонку
                        for (const key in row) {
                            const val = row[key];
                            if (typeof val === 'string' && val.length > 0 && !isNaN(parseFloat(val))) {
                                if (!name && val !== 'Игрок' && val !== 'Ник игрока') {
                                    name = val;
                                }
                            }
                        }
                    }
                    
                    if (isNaN(score)) {
                        // Пробуем найти любую числовую колонку
                        for (const key in row) {
                            const val = row[key];
                            if (!isNaN(parseFloat(val)) && typeof val !== 'string') {
                                score = parseFloat(val);
                                break;
                            }
                        }
                    }
                    
                    if (name && !isNaN(score)) {
                        if (playerScores[name]) {
                            playerScores[name] += score;
                        } else {
                            playerScores[name] = score;
                        }
                    }
                }
                
                players = Object.entries(playerScores).map(([name, score]) => ({ name, score }));
                players.sort((a, b) => b.score - a.score);
                
                console.log('Найдено игроков:', players.length);
                
                if (players.length === 0) {
                    throw new Error('Не найдены колонки "Игрок" и "Баллы"');
                }
                
                renderTable();
                updateStats();
                
                loadingEl.style.display = 'none';
                tableEl.style.display = 'table';
                document.getElementById('updateTime').innerText = new Date().toLocaleString();
                
            } catch (error) {
                console.error('Ошибка:', error);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.innerHTML = `❌ Ошибка: ${error.message}<br><br>Проверьте, что таблица подключена к Sheet.best`;
            }
        }
        
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = players;
            
            if (searchTerm) {
                filtered = players.filter(p => p.name.toLowerCase().includes(searchTerm));
            }
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            for (let i = 0; i < filtered.length; i++) {
                const player = filtered[i];
                const row = tbody.insertRow();
                let rankClass = '';
                if (i === 0) rankClass = 'rank-1';
                else if (i === 1) rankClass = 'rank-2';
                else if (i === 2) rankClass = 'rank-3';
                
                row.innerHTML = `
                    <td class="${rankClass}" style="text-align:center; font-weight:bold;">${i+1}</td>
                    <td style="font-weight:500;">${escapeHtml(player.name)}</td>
                    <td style="font-weight:bold; color:#667eea;">${player.score}</td>
                `;
            }
        }
        
        function updateStats() {
            document.getElementById('totalPlayers').innerText = players.length;
            document.getElementById('topScore').innerText = players.length > 0 ? players[0].score : 0;
            const avgScore = players.length > 0 ? (players.reduce((a,b) => a + b.score, 0) / players.length).toFixed(1) : 0;
            document.getElementById('avgScore').innerText = avgScore;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', () => renderTable());
        
        loadData();
    </script>
</body>
</html>
