<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillaz — Рейтинг</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; color: white; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .search-box {
            background: white;
            border-radius: 30px;
            padding: 12px 20px;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            text-align: center;
        }
        .stat-card h3 { font-size: 2rem; color: #667eea; }
        .table-container {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #667eea; color: white; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f5f5f5; }
        .rank-1 { background: #ffd700; color: #333; font-weight: bold; }
        .rank-2 { background: #c0c0c0; color: #333; font-weight: bold; }
        .rank-3 { background: #cd7f32; color: white; font-weight: bold; }
        .loading, .error { text-align: center; padding: 50px; color: white; }
        .error { color: #ff6b6b; }
        .footer { text-align: center; margin-top: 30px; color: white; opacity: 0.7; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 GORILLAZ — Рейтинг</h1>
            <p>Система подсчёта баллов</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск игрока...">
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3 id="totalPlayers">—</h3><p>Всего игроков</p></div>
            <div class="stat-card"><h3 id="topScore">—</h3><p>Максимум баллов</p></div>
            <div class="stat-card"><h3 id="avgScore">—</h3><p>Средний балл</p></div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">🔄 Загрузка...</div>
            <div id="errorMsg" class="error" style="display:none;"></div>
            <table id="ratingTable" style="display:none;">
                <thead><tr><th>🏆 Место</th><th>👤 Игрок</th><th>⭐ Баллы</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            <button onclick="loadData()">🔄 Обновить</button>
        </div>
    </div>

    <script>
        // ⚠️ ВСТАВЬ СВОЙ ПРАВИЛЬНЫЙ ID ТАБЛИЦЫ (из адресной строки)
        const SHEET_ID = '1lG7D8K9N8HqHJol6uLzzzbQCeUrG1FmS9trZSBlp7n4';
        
        let players = [];
        
        async function loadData() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('ratingTable');
            const errorMsg = document.getElementById('errorMsg');
            
            loading.style.display = 'block';
            loading.innerHTML = '🔄 Загрузка...';
            table.style.display = 'none';
            errorMsg.style.display = 'none';
            
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
                console.log('Запрос:', url);
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} — проверьте ID и публикацию`);
                }
                
                const text = await response.text();
                let jsonText = text;
                if (text.startsWith('google.visualization.Query.setResponse(')) {
                    jsonText = text.substring(47, text.length - 2);
                }
                
                const data = JSON.parse(jsonText);
                
                if (!data.table || !data.table.rows) {
                    throw new Error('Нет данных в таблице');
                }
                
                const cols = data.table.cols;
                
                // Ищем колонки "Игрок" и "Баллы"
                let nameCol = -1, scoreCol = -1;
                for (let i = 0; i < cols.length; i++) {
                    const label = cols[i].label;
                    if (label === 'Игрок' || label === 'Ник игрока' || label === '🏆 Игрок') nameCol = i;
                    if (label === 'Баллы' || label === '⭐ Баллы') scoreCol = i;
                }
                
                // Если не нашли, берём первую текстовую и первую числовую
                if (nameCol === -1) {
                    for (let i = 0; i < cols.length; i++) {
                        if (cols[i].type === 'string') { nameCol = i; break; }
                    }
                }
                if (scoreCol === -1) {
                    for (let i = 0; i < cols.length; i++) {
                        if (cols[i].type === 'number') { scoreCol = i; break; }
                    }
                }
                
                if (nameCol === -1 || scoreCol === -1) {
                    throw new Error('Не найдены колонки "Игрок" и "Баллы"');
                }
                
                const playerScores = {};
                for (const row of data.table.rows) {
                    if (!row.c) continue;
                    const name = row.c[nameCol]?.v;
                    const score = parseFloat(row.c[scoreCol]?.v);
                    if (name && !isNaN(score) && name !== 'Игрок' && name !== 'Ник игрока') {
                        playerScores[name] = (playerScores[name] || 0) + score;
                    }
                }
                
                players = Object.entries(playerScores).map(([n, s]) => ({ name: n, score: s }));
                players.sort((a, b) => b.score - a.score);
                
                if (players.length === 0) throw new Error('Нет данных об игроках');
                
                renderTable();
                updateStats();
                
                loading.style.display = 'none';
                table.style.display = 'table';
                
            } catch (error) {
                loading.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = `
                    ❌ Ошибка: ${error.message}<br><br>
                    <strong>Сделайте следующее:</strong><br><br>
                    1️⃣ Откройте <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank">вашу таблицу</a><br>
                    2️⃣ Нажмите <strong>синюю кнопку "Настройки доступа"</strong><br>
                    3️⃣ Выберите <strong>"Все, у кого есть ссылка"</strong><br>
                    4️⃣ Нажмите <strong>"Готово"</strong><br>
                    5️⃣ <strong>Файл → Опубликовать в интернете</strong> → нажмите "Опубликовать"<br>
                    6️⃣ Обновите эту страницу через 1 минуту
                `;
            }
        }
        
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = searchTerm ? players.filter(p => p.name.toLowerCase().includes(searchTerm)) : players;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            for (let i = 0; i < filtered.length; i++) {
                const p = filtered[i];
                const row = tbody.insertRow();
                let rankClass = '';
                if (i === 0) rankClass = 'rank-1';
                else if (i === 1) rankClass = 'rank-2';
                else if (i === 2) rankClass = 'rank-3';
                
                row.innerHTML = `
                    <td class="${rankClass}" style="text-align:center; font-weight:bold;">${i+1}</td>
                    <td>${escapeHtml(p.name)}NonNull
                    <td style="font-weight:bold; color:#667eea;">${p.score}NonNull
                `;
            }
        }
        
        function updateStats() {
            document.getElementById('totalPlayers').innerText = players.length;
            document.getElementById('topScore').innerText = players[0]?.score || 0;
            const avg = players.length ? (players.reduce((a,b) => a + b.score, 0) / players.length).toFixed(1) : 0;
            document.getElementById('avgScore').innerText = avg;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', () => renderTable());
        
        loadData();
    </script>
</body>
</html>
