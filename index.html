<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillaz — Рейтинг гильдии</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; color: white; }
        .header h1 { font-size: 3rem; margin-bottom: 10px; }
        .controls {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #f0f0f0;
        }
        .filter-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            min-width: 140px;
            text-align: center;
        }
        .stat-card h3 { font-size: 2.2rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .table-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; cursor: pointer; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f8f9ff; }
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffb700); color: #333; font-weight: bold; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); color: #333; font-weight: bold; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #b86b2a); color: white; font-weight: bold; }
        .loading, .error { text-align: center; padding: 50px; color: white; font-size: 1.2rem; }
        .error { color: #ff6b6b; }
        .debug { background: #1a1a2e; color: #00ff88; padding: 15px; border-radius: 10px; margin-top: 20px; font-family: monospace; font-size: 12px; overflow-x: auto; white-space: pre-wrap; }
        .footer { text-align: center; margin-top: 30px; color: white; opacity: 0.7; }
        button { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 GORILLAZ — Рейтинг гильдии</h1>
            <p>Система подсчёта баллов</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск игрока...">
            </div>
            <div class="filter-buttons" id="filterButtons"></div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3 id="totalPlayers">—</h3><p>Всего игроков</p></div>
            <div class="stat-card"><h3 id="topScore">—</h3><p>Максимум баллов</p></div>
            <div class="stat-card"><h3 id="avgScore">—</h3><p>Средний балл</p></div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">🔄 Загрузка данных...</div>
            <div id="errorMessage" class="error" style="display:none;"></div>
            <table id="ratingTable" style="display: none;">
                <thead><tr><th>🏆 Место</th><th>👤 Игрок</th><th>⭐ Баллы</th><th>📊 Активность</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <!-- Блок отладки — показывает, что нашёл скрипт -->
        <div id="debugPanel" class="debug" style="display:none;"></div>

        <div class="footer">
            📅 Последнее обновление: <span id="updateTime">—</span>
            <br>
            <button onclick="loadData()">🔄 Обновить вручную</button>
            <button onclick="showDebug()">🐛 Показать отладку</button>
        </div>
    </div>

    <script>
        // ==================== НАСТРОЙКИ ====================
        // ⚠️ ВСТАВЬ СВОЙ ID ТАБЛИЦЫ:
        const SPREADSHEET_ID = '1lG7D8K9N8HqHJol6uLzzzbQCeUrG1FmS9trZSBlp7n4';
        
        const SHEETS = ['SpiderPoints', 'Кта', 'Ава пэпэ', 'Прочее'];
        
        // ==================== ПЕРЕМЕННЫЕ ====================
        let allData = [];
        let currentSheet = 'all';
        let isLoading = false;
        let debugInfo = [];
        
        function addDebug(msg) {
            debugInfo.push(new Date().toLocaleTimeString() + ': ' + msg);
            console.log(msg);
        }
        
        function showDebug() {
            const panel = document.getElementById('debugPanel');
            panel.innerHTML = '<strong>🐛 Отладочная информация:</strong><br><br>' + debugInfo.join('<br>');
            panel.style.display = 'block';
            setTimeout(() => { panel.style.display = 'none'; }, 10000);
        }
        
        // ==================== ЗАГРУЗКА ====================
        async function loadData() {
            if (isLoading) return;
            isLoading = true;
            debugInfo = [];
            addDebug('🚀 Начало загрузки данных');
            
            const loadingEl = document.getElementById('loading');
            const tableEl = document.getElementById('ratingTable');
            const errorEl = document.getElementById('errorMessage');
            
            loadingEl.style.display = 'block';
            loadingEl.innerHTML = '🔄 Загрузка данных...';
            tableEl.style.display = 'none';
            errorEl.style.display = 'none';
            
            allData = [];
            
            try {
                for (const sheetName of SHEETS) {
                    addDebug(`📡 Загрузка листа: ${sheetName}`);
                    try {
                        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
                        const response = await fetch(url);
                        
                        if (!response.ok) {
                            addDebug(`❌ Ошибка HTTP ${response.status} для листа ${sheetName}`);
                            continue;
                        }
                        
                        const text = await response.text();
                        addDebug(`📦 Получено ${text.length} символов для ${sheetName}`);
                        
                        const jsonText = text.substring(47, text.length - 2);
                        const data = JSON.parse(jsonText);
                        
                        if (data.table && data.table.rows) {
                            const rows = data.table.rows;
                            const cols = data.table.cols;
                            
                            addDebug(`📊 Лист ${sheetName}: ${rows.length} строк, ${cols.length} колонок`);
                            
                            // Выводим названия колонок
                            const colNames = cols.map(c => c.label);
                            addDebug(`📋 Колонки: ${JSON.stringify(colNames)}`);
                            
                            let nameCol = -1, scoreCol = -1;
                            for (let i = 0; i < cols.length; i++) {
                                const label = cols[i].label;
                                if (label === '🏆 Игрок' || label === 'Игрок') nameCol = i;
                                if (label === '⭐ Баллы' || label === 'Баллы') scoreCol = i;
                            }
                            
                            addDebug(`🔍 Поиск колонок: nameCol=${nameCol}, scoreCol=${scoreCol}`);
                            
                            if (nameCol !== -1 && scoreCol !== -1) {
                                let rowCount = 0;
                                for (let i = 0; i < rows.length; i++) {
                                    const row = rows[i];
                                    if (row.c && row.c[nameCol] && row.c[scoreCol]) {
                                        const playerName = row.c[nameCol].v;
                                        let score = row.c[scoreCol].v;
                                        if (playerName && playerName !== '🏆 Игрок' && playerName !== 'Игрок') {
                                            allData.push({
                                                player: playerName,
                                                score: Number(score) || 0,
                                                activity: sheetName
                                            });
                                            rowCount++;
                                        }
                                    }
                                }
                                addDebug(`✅ Лист ${sheetName}: найдено ${rowCount} игроков`);
                            } else {
                                addDebug(`⚠️ Лист ${sheetName}: не найдены нужные колонки`);
                            }
                        } else {
                            addDebug(`⚠️ Лист ${sheetName}: нет таблицы в ответе`);
                        }
                    } catch (e) {
                        addDebug(`❌ Ошибка листа ${sheetName}: ${e.message}`);
                    }
                }
                
                addDebug(`📊 Всего собрано данных: ${allData.length} записей`);
                
                if (allData.length === 0) {
                    throw new Error('Нет данных. Проверьте, что на листах есть колонки "🏆 Игрок" и "⭐ Баллы"');
                }
                
                renderFilters();
                renderTable();
                updateStats();
                
                loadingEl.style.display = 'none';
                tableEl.style.display = 'table';
                document.getElementById('updateTime').innerText = new Date().toLocaleString();
                addDebug('✅ Загрузка завершена успешно');
                
            } catch (error) {
                addDebug(`❌ КРИТИЧЕСКАЯ ОШИБКА: ${error.message}`);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.innerHTML = '❌ ' + error.message + '<br><br>Нажмите "Показать отладку" для деталей';
            } finally {
                isLoading = false;
            }
        }
        
        function renderFilters() {
            const sheets = [...new Set(allData.map(d => d.activity))];
            const container = document.getElementById('filterButtons');
            container.innerHTML = '<button class="filter-btn active" data-sheet="all">📊 Все активности</button>';
            
            sheets.forEach(sheet => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.sheet = sheet;
                btn.innerHTML = getActivityIcon(sheet) + ' ' + sheet;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSheet = sheet;
                    renderTable();
                    updateStats();
                };
                container.appendChild(btn);
            });
        }
        
        function renderTable() {
            let filtered = [...allData];
            if (currentSheet !== 'all') {
                filtered = filtered.filter(d => d.activity === currentSheet);
            }
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(d => d.player.toLowerCase().includes(searchTerm));
            }
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if (currentSheet === 'all') {
                const playerMap = new Map();
                for (const item of filtered) {
                    playerMap.set(item.player, (playerMap.get(item.player) || 0) + item.score);
                }
                let aggregated = Array.from(playerMap.entries()).map(([player, score]) => ({ player, score }));
                aggregated.sort((a, b) => b.score - a.score);
                
                for (let i = 0; i < aggregated.length; i++) {
                    const item = aggregated[i];
                    const row = tbody.insertRow();
                    let rankClass = '';
                    if (i === 0) rankClass = 'rank-1';
                    else if (i === 1) rankClass = 'rank-2';
                    else if (i === 2) rankClass = 'rank-3';
                    row.innerHTML = `
                        <td class="${rankClass}" style="text-align:center; font-weight:bold;">${i+1}</td>
                        <td>${escapeHtml(item.player)}</td>
                        <td style="font-weight:bold; color:#667eea;">${item.score}</td>
                        <td>📊 Все активности</td>
                    `;
                }
            } else {
                filtered.sort((a, b) => b.score - a.score);
                for (let i = 0; i < filtered.length; i++) {
                    const item = filtered[i];
                    const row = tbody.insertRow();
                    let rankClass = '';
                    if (i === 0) rankClass = 'rank-1';
                    else if (i === 1) rankClass = 'rank-2';
                    else if (i === 2) rankClass = 'rank-3';
                    row.innerHTML = `
                        <td class="${rankClass}" style="text-align:center; font-weight:bold;">${i+1}</td>
                        <td>${escapeHtml(item.player)}</td>
                        <td style="font-weight:bold; color:#667eea;">${item.score}</td>
                        <td>${getActivityIcon(item.activity)} ${item.activity}</td>
                    `;
                }
            }
        }
        
        function updateStats() {
            let filtered = [...allData];
            if (currentSheet !== 'all') {
                filtered = filtered.filter(d => d.activity === currentSheet);
            }
            const uniquePlayers = [...new Set(filtered.map(d => d.player))];
            const scores = filtered.map(d => d.score);
            const maxScore = Math.max(...scores, 0);
            const avgScore = uniquePlayers.length ? (scores.reduce((a,b) => a + b, 0) / uniquePlayers.length).toFixed(1) : 0;
            
            document.getElementById('totalPlayers').innerText = uniquePlayers.length;
            document.getElementById('topScore').innerText = maxScore;
            document.getElementById('avgScore').innerText = avgScore;
        }
        
        function getActivityIcon(activity) {
            const icons = { 'SpiderPoints': '🕷️', 'Кта': '⚔️', 'Ава пэпэ': '👾', 'Прочее': '📋' };
            return icons[activity] || '📊';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', () => renderTable());
        
        loadData();
    </script>
</body>
</html>
