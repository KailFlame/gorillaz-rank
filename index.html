<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillaz — Рейтинг гильдии</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.85;
        }

        .controls {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            min-width: 140px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-card h3 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-card p {
            color: #666;
            margin-top: 5px;
        }

        .table-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9ff;
        }

        .rank-1 {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            color: #333;
            font-weight: bold;
        }

        .rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #a8a8a8);
            color: #333;
            font-weight: bold;
        }

        .rank-3 {
            background: linear-gradient(135deg, #cd7f32, #b86b2a);
            color: white;
            font-weight: bold;
        }

        .loading, .error {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2rem;
        }

        .error {
            color: #ff6b6b;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            opacity: 0.7;
            font-size: 0.85rem;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 GORILLAZ — Рейтинг гильдии</h1>
            <p>Система подсчёта баллов • Обновляется автоматически</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск игрока...">
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3 id="totalPlayers">—</h3><p>Всего игроков</p></div>
            <div class="stat-card"><h3 id="topScore">—</h3><p>Максимум баллов</p></div>
            <div class="stat-card"><h3 id="avgScore">—</h3><p>Средний балл</p></div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">🔄 Загрузка данных...</div>
            <div id="errorMsg" class="error" style="display:none;"></div>
            <table id="ratingTable" style="display: none;">
                <thead>
                    <tr>
                        <th>🏆 Место</th>
                        <th>👤 Игрок</th>
                        <th>⭐ Баллы</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            📅 Последнее обновление: <span id="updateTime">—</span>
            <br>
            <button onclick="loadData()">🔄 Обновить вручную</button>
        </div>
    </div>

    <script>
        // ⚠️ ТВОЙ ID ТАБЛИЦЫ
        const SHEET_ID = '1S1RiKUiEcYbcax5nhWeA13_GNgh_6hstL1ebZhx6o1k';
        
        let players = [];
        
        async function loadData() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('ratingTable');
            const errorMsg = document.getElementById('errorMsg');
            
            loading.style.display = 'block';
            loading.innerHTML = '🔄 Загрузка данных...';
            table.style.display = 'none';
            errorMsg.style.display = 'none';
            
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
                console.log('Запрос:', url);
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const csvText = await response.text();
                console.log('Получено символов:', csvText.length);
                
                if (csvText.includes('<!DOCTYPE') || csvText.includes('/*O_o*/')) {
                    throw new Error('Таблица не опубликована публично');
                }
                
                const lines = csvText.split('\n');
                if (lines.length < 2) {
                    throw new Error('Нет данных');
                }
                
                const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
                console.log('Заголовки:', headers);
                
                // АВТОМАТИЧЕСКИЙ ПОИСК КОЛОНОК
                let nameCol = -1;
                let scoreCol = -1;
                
                // 1. Ищем по названиям
                for (let i = 0; i < headers.length; i++) {
                    const h = headers[i].toLowerCase();
                    if (h.includes('игрок') || h.includes('ник') || h.includes('player') || h.includes('name')) {
                        nameCol = i;
                    }
                    if (h.includes('балл') || h.includes('score') || h.includes('points')) {
                        scoreCol = i;
                    }
                }
                
                // 2. Если не нашли, берём первую текстовую и первую числовую колонку
                if (nameCol === -1) {
                    for (let i = 0; i < headers.length; i++) {
                        if (headers[i] && headers[i] !== '') {
                            nameCol = i;
                            break;
                        }
                    }
                }
                
                // 3. Ищем числовую колонку по данным
                if (scoreCol === -1) {
                    // Проверяем первые 10 строк на наличие чисел
                    for (let i = 1; i < Math.min(lines.length, 11); i++) {
                        const line = lines[i];
                        if (!line) continue;
                        
                        const cells = [];
                        let current = '';
                        let inQuotes = false;
                        
                        for (let j = 0; j < line.length; j++) {
                            const char = line[j];
                            if (char === '"') {
                                inQuotes = !inQuotes;
                            } else if (char === ',' && !inQuotes) {
                                cells.push(current.replace(/^"|"$/g, '').trim());
                                current = '';
                            } else {
                                current += char;
                            }
                        }
                        cells.push(current.replace(/^"|"$/g, '').trim());
                        
                        for (let k = 0; k < cells.length; k++) {
                            const val = cells[k];
                            if (val && !isNaN(parseFloat(val)) && val !== '') {
                                scoreCol = k;
                                break;
                            }
                        }
                        if (scoreCol !== -1) break;
                    }
                }
                
                console.log('Найдена колонка имени:', nameCol);
                console.log('Найдена колонка баллов:', scoreCol);
                
                if (nameCol === -1) {
                    throw new Error('Не удалось найти колонку с именами игроков');
                }
                if (scoreCol === -1) {
                    throw new Error('Не удалось найти колонку с баллами');
                }
                
                // Собираем данные
                const playerScores = {};
                
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    
                    const cells = [];
                    let current = '';
                    let inQuotes = false;
                    
                    for (let j = 0; j < line.length; j++) {
                        const char = line[j];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            cells.push(current.replace(/^"|"$/g, '').trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    cells.push(current.replace(/^"|"$/g, '').trim());
                    
                    const name = cells[nameCol];
                    const score = parseFloat(cells[scoreCol]);
                    
                    if (name && name !== '' && !isNaN(score)) {
                        // Пропускаем строки-заголовки
                        if (name === headers[nameCol]) continue;
                        if (name === 'Игрок' || name === 'Ник игрока') continue;
                        
                        if (playerScores[name]) {
                            playerScores[name] += score;
                        } else {
                            playerScores[name] = score;
                        }
                    }
                }
                
                players = Object.entries(playerScores).map(([n, s]) => ({ name: n, score: s }));
                players.sort((a, b) => b.score - a.score);
                
                console.log('Найдено игроков:', players.length);
                
                if (players.length === 0) {
                    throw new Error('Нет данных. Проверьте, что в таблице есть имена и баллы');
                }
                
                renderTable();
                updateStats();
                
                loading.style.display = 'none';
                table.style.display = 'table';
                document.getElementById('updateTime').innerText = new Date().toLocaleString();
                
            } catch (error) {
                console.error('Ошибка:', error);
                loading.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = `
                    ❌ Ошибка: ${error.message}<br><br>
                    <strong>Сделайте следующее:</strong><br><br>
                    1️⃣ Откройте <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank">вашу таблицу</a><br>
                    2️⃣ Нажмите <strong>синюю кнопку "Настройки доступа"</strong><br>
                    3️⃣ Выберите <strong>"Все, у кого есть ссылка"</strong><br>
                    4️⃣ Нажмите <strong>"Готово"</strong><br>
                    5️⃣ <strong>Файл → Опубликовать в интернете</strong> → выберите <strong>"Вся таблица"</strong> → формат <strong>"CSV"</strong> → нажмите "Опубликовать"<br>
                    6️⃣ Обновите эту страницу через 1 минуту
                `;
            }
        }
        
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = searchTerm ? players.filter(p => p.name.toLowerCase().includes(searchTerm)) : players;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            for (let i = 0; i < filtered.length; i++) {
                const p = filtered[i];
                const row = tbody.insertRow();
                let rankClass = '';
                if (i === 0) rankClass = 'rank-1';
                else if (i === 1) rankClass = 'rank-2';
                else if (i === 2) rankClass = 'rank-3';
                
                row.innerHTML = `
                    <td class="${rankClass}" style="text-align:center; font-weight:bold;">${i+1}</td>
                    <td style="font-weight:500;">${escapeHtml(p.name)}</td>
                    <td style="font-weight:bold; color:#667eea;">${p.score}</td>
                `;
            }
        }
        
        function updateStats() {
            document.getElementById('totalPlayers').innerText = players.length;
            document.getElementById('topScore').innerText = players[0]?.score || 0;
            const avg = players.length ? (players.reduce((a,b) => a + b.score, 0) / players.length).toFixed(1) : 0;
            document.getElementById('avgScore').innerText = avg;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', () => renderTable());
        
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
