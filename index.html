<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillaz — Рейтинг</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; color: white; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .search-box {
            background: white;
            border-radius: 30px;
            padding: 12px 20px;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            text-align: center;
        }
        .stat-card h3 { font-size: 2rem; color: #667eea; }
        .table-container {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #667eea; color: white; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f5f5f5; }
        .rank-1 { background: #ffd700; color: #333; font-weight: bold; }
        .rank-2 { background: #c0c0c0; color: #333; font-weight: bold; }
        .rank-3 { background: #cd7f32; color: white; font-weight: bold; }
        .loading, .error { text-align: center; padding: 50px; color: white; }
        .error { color: #ff6b6b; }
        .footer { text-align: center; margin-top: 30px; color: white; opacity: 0.7; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 GORILLAZ — Рейтинг</h1>
            <p>Система подсчёта баллов</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск игрока...">
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3 id="totalPlayers">—</h3><p>Всего игроков</p></div>
            <div class="stat-card"><h3 id="topScore">—</h3><p>Максимум баллов</p></div>
            <div class="stat-card"><h3 id="avgScore">—</h3><p>Средний балл</p></div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">🔄 Загрузка...</div>
            <div id="errorMsg" class="error" style="display:none;"></div>
            <table id="ratingTable" style="display:none;">
                <thead><tr><th>🏆 Место</th><th>👤 Игрок</th><th>⭐ Баллы</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            <button onclick="loadData()">🔄 Обновить</button>
        </div>
    </div>

    <script>
        // ВАШ ID ТАБЛИЦЫ
        const SHEET_ID = '11G7D8K9N8HqHJ0l6uLzzzbQCeUrG1FmS9trZ5Blp7n4';
        
        // Названия листов, которые нужно проверить
        const SHEET_NAMES = ['SpiderPoints', 'Кта', 'Ава пэпэ', 'Прочее'];
        
        let allPlayers = [];
        
        async function loadSheetData(sheetName) {
            // Сначала пробуем получить JSON с информацией о листах
            const infoUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            
            try {
                const infoResponse = await fetch(infoUrl);
                if (infoResponse.ok) {
                    const text = await infoResponse.text();
                    const jsonText = text.substring(47, text.length - 2);
                    const data = JSON.parse(jsonText);
                    
                    // Ищем нужный лист
                    if (data.table && data.table.rows) {
                        // Парсим данные напрямую
                        return await parseSheetData(sheetName);
                    }
                }
            } catch (e) {
                console.log('JSON метод не сработал, пробуем CSV');
            }
            
            // Пробуем через CSV экспорт (без указания gid, просто по имени)
            const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
            
            try {
                const response = await fetch(csvUrl);
                if (response.ok) {
                    const csvText = await response.text();
                    return parseCSV(csvText, sheetName);
                }
            } catch (e) {
                console.log(`Не удалось загрузить ${sheetName}:`, e);
            }
            
            return [];
        }
        
        async function parseSheetData(sheetName) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) return [];
                
                const text = await response.text();
                const jsonText = text.substring(47, text.length - 2);
                const data = JSON.parse(jsonText);
                
                if (!data.table || !data.table.rows) return [];
                
                const rows = data.table.rows;
                const cols = data.table.cols;
                
                // Ищем колонки с игроком и баллами
                let nameCol = -1;
                let scoreCol = -1;
                
                for (let i = 0; i < cols.length; i++) {
                    const label = cols[i].label;
                    if (label === 'Игрок' || label === 'Ник игрока' || label === '🏆 Игрок') {
                        nameCol = i;
                    }
                    if (label === 'Баллы' || label === '⭐ Баллы') {
                        scoreCol = i;
                    }
                }
                
                // Если не нашли по названиям, пробуем по позиции (колонки G и H)
                if (nameCol === -1 && cols.length > 6 && (cols[6].label === 'Игрок' || cols[6].label === '')) {
                    nameCol = 6;
                }
                if (scoreCol === -1 && cols.length > 7 && (cols[7].label === 'Баллы' || cols[7].label === '')) {
                    scoreCol = 7;
                }
                
                if (nameCol === -1 || scoreCol === -1) {
                    console.log(`Не найдены колонки для ${sheetName}`);
                    return [];
                }
                
                const players = [];
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.c && row.c[nameCol] && row.c[scoreCol]) {
                        const name = row.c[nameCol].v;
                        const score = parseFloat(row.c[scoreCol].v);
                        
                        if (name && !isNaN(score) && name !== 'Игрок' && name !== 'Ник игрока') {
                            players.push({ name: name, score: score, sheet: sheetName });
                        }
                    }
                }
                
                console.log(`${sheetName}: найдено ${players.length} игроков`);
                return players;
                
            } catch (e) {
                console.log(`Ошибка парсинга ${sheetName}:`, e);
                return [];
            }
        }
        
        function parseCSV(csvText, sheetName) {
            const lines = csvText.split('\n');
            if (lines.length < 2) return [];
            
            const players = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                // Простой парсинг CSV
                const cells = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        cells.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                cells.push(current.trim());
                
                // Убираем кавычки
                for (let k = 0; k < cells.length; k++) {
                    cells[k] = cells[k].replace(/^"|"$/g, '');
                }
                
                // Ищем имя (текст) и баллы (число)
                let name = null;
                let score = null;
                
                for (let k = 0; k < cells.length; k++) {
                    const val = cells[k];
                    if (val && val !== '' && isNaN(parseFloat(val))) {
                        if (val !== 'Игрок' && val !== 'Ник игрока') {
                            name = val;
                        }
                    }
                    if (val && val !== '' && !isNaN(parseFloat(val))) {
                        const num = parseFloat(val);
                        if (!isNaN(num)) {
                            score = num;
                        }
                    }
                }
                
                if (name && score !== null) {
                    players.push({ name: name, score: score, sheet: sheetName });
                }
            }
            
            console.log(`${sheetName} (CSV): найдено ${players.length} игроков`);
            return players;
        }
        
        async function loadData() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('ratingTable');
            const errorMsg = document.getElementById('errorMsg');
            
            loading.style.display = 'block';
            loading.innerHTML = '🔄 Загрузка данных...';
            table.style.display = 'none';
            errorMsg.style.display = 'none';
            
            allPlayers = [];
            
            for (const sheetName of SHEET_NAMES) {
                const players = await loadSheetData(sheetName);
                allPlayers.push(...players);
            }
            
            if (allPlayers.length === 0) {
                loading.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = `
                    ❌ Не удалось загрузить данные.<br><br>
                    <strong>Сделайте следующее:</strong><br><br>
                    1️⃣ Откройте <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank">вашу таблицу</a><br>
                    2️⃣ Нажмите <strong>Файл → Опубликовать в интернете</strong><br>
                    3️⃣ Нажмите <strong>"Опубликовать"</strong><br>
                    4️⃣ Обновите эту страницу через 1 минуту<br><br>
                    <small>Убедитесь, что на листах есть колонки "Игрок" и "Баллы" (колонки G и H)</small>
                `;
                return;
            }
            
            // Суммируем баллы по игрокам
            const playerMap = new Map();
            for (const p of allPlayers) {
                playerMap.set(p.name, (playerMap.get(p.name) || 0) + p.score);
            }
            
            const players = Array.from(playerMap.entries()).map(([name, score]) => ({ name, score }));
            players.sort((a, b) => b.score - a.score);
            
            window.currentPlayers = players;
            
            renderTable();
            updateStats(players);
            
            loading.style.display = 'none';
            table.style.display = 'table';
        }
        
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = window.currentPlayers || [];
            
            if (searchTerm) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));
            }
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            for (let i = 0; i < filtered.length; i++) {
                const p = filtered[i];
                const row = tbody.insertRow();
                let rankClass = '';
                if (i === 0) rankClass = 'rank-1';
                else if (i === 1) rankClass = 'rank-2';
                else if (i === 2) rankClass = 'rank-3';
                
                row.innerHTML = `
                    <td class="${rankClass}" style="text-align:center; font-weight:bold;">${i+1}</td>
                    <td>${escapeHtml(p.name)}</td>
                    <td style="font-weight:bold; color:#667eea;">${p.score}</td>
                `;
            }
        }
        
        function updateStats(players) {
            document.getElementById('totalPlayers').innerText = players.length;
            document.getElementById('topScore').innerText = players.length > 0 ? players[0].score : 0;
            const avg = players.length > 0 ? (players.reduce((a,b) => a + b.score, 0) / players.length).toFixed(1) : 0;
            document.getElementById('avgScore').innerText = avg;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', () => renderTable());
        
        loadData();
    </script>
</body>
</html>
