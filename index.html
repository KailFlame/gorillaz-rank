<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillaz — Рейтинг гильдии</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; color: white; }
        .header h1 { font-size: 3rem; margin-bottom: 10px; }
        .controls {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #f0f0f0;
        }
        .filter-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            min-width: 140px;
            text-align: center;
        }
        .stat-card h3 { font-size: 2.2rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .table-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; cursor: pointer; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f8f9ff; }
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffb700); color: #333; font-weight: bold; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); color: #333; font-weight: bold; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #b86b2a); color: white; font-weight: bold; }
        .loading, .error { text-align: center; padding: 50px; color: white; font-size: 1.2rem; }
        .error { color: #ff6b6b; }
        .footer { text-align: center; margin-top: 30px; color: white; opacity: 0.7; }
        button { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 GORILLAZ — Рейтинг гильдии</h1>
            <p>Система подсчёта баллов</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск игрока...">
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3 id="totalPlayers">—</h3><p>Всего игроков</p></div>
            <div class="stat-card"><h3 id="topScore">—</h3><p>Максимум баллов</p></div>
            <div class="stat-card"><h3 id="avgScore">—</h3><p>Средний балл</p></div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">🔄 Загрузка данных...</div>
            <div id="errorMessage" class="error" style="display:none;"></div>
            <table id="ratingTable" style="display: none;">
                <thead><tr><th>🏆 Место</th><th>👤 Игрок</th><th>⭐ Баллы</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            📅 Последнее обновление: <span id="updateTime">—</span>
            <br>
            <button onclick="loadData()">🔄 Обновить вручную</button>
        </div>
    </div>

    <script>
        // ⚠️ ВАЖНО: ВСТАВЬТЕ СВОЮ ССЫЛКУ НА CSV (без gid!)
        // Пример: const CSV_URL = 'https://docs.google.com/spreadsheets/d/ВАШ_ID/export?format=csv';
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQEtGSnC_DAUpxxQ_pGl5ugtpabmKNo35KPtoZTu9RU8pgbk6Gw5eOTCKzo6xbyzHMptF2vmrl7Cx_O/pubhtml';
        
        let players = [];
        let isLoading = false;
        
        async function loadData() {
            if (isLoading) return;
            isLoading = true;
            
            const loadingEl = document.getElementById('loading');
            const tableEl = document.getElementById('ratingTable');
            const errorEl = document.getElementById('errorMessage');
            
            loadingEl.style.display = 'block';
            loadingEl.innerHTML = '🔄 Загрузка данных...';
            tableEl.style.display = 'none';
            errorEl.style.display = 'none';
            
            try {
                console.log('Загрузка:', CSV_URL);
                const response = await fetch(CSV_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const csvText = await response.text();
                console.log('Получено символов:', csvText.length);
                
                // Парсим CSV
                const lines = csvText.split('\n');
                console.log('Строк в файле:', lines.length);
                
                if (lines.length < 2) {
                    throw new Error('Файл пуст');
                }
                
                // Получаем заголовки
                const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
                console.log('Заголовки:', headers);
                
                // Ищем колонки (по разным возможным названиям)
                let nameCol = -1;
                let scoreCol = -1;
                
                for (let i = 0; i < headers.length; i++) {
                    const h = headers[i].toLowerCase();
                    if (h.includes('игрок') || h.includes('ник') || h.includes('player') || h.includes('name')) {
                        nameCol = i;
                    }
                    if (h.includes('балл') || h.includes('score') || h.includes('points')) {
                        scoreCol = i;
                    }
                }
                
                console.log('Колонка имени:', nameCol);
                console.log('Колонка баллов:', scoreCol);
                
                if (nameCol === -1 || scoreCol === -1) {
                    throw new Error(`Не найдены колонки. Доступные заголовки: ${headers.join(', ')}`);
                }
                
                // Собираем данные
                const playerScores = {};
                
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    
                    // Парсим строку CSV
                    const row = [];
                    let inQuote = false;
                    let current = '';
                    const line = lines[i];
                    
                    for (let j = 0; j < line.length; j++) {
                        const char = line[j];
                        if (char === '"') {
                            inQuote = !inQuote;
                        } else if (char === ',' && !inQuote) {
                            row.push(current.replace(/^"|"$/g, '').trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    row.push(current.replace(/^"|"$/g, '').trim());
                    
                    const playerName = row[nameCol];
                    const score = parseFloat(row[scoreCol]);
                    
                    if (playerName && playerName !== '' && !isNaN(score)) {
                        // Пропускаем заголовки
                        if (playerName === headers[nameCol]) continue;
                        
                        if (playerScores[playerName]) {
                            playerScores[playerName] += score;
                        } else {
                            playerScores[playerName] = score;
                        }
                    }
                }
                
                // Преобразуем в массив и сортируем
                players = Object.entries(playerScores).map(([name, score]) => ({ name, score }));
                players.sort((a, b) => b.score - a.score);
                
                console.log('Найдено игроков:', players.length);
                
                if (players.length === 0) {
                    throw new Error('Нет данных о игроках. Проверьте колонки в таблице.');
                }
                
                // Отображаем
                renderTable();
                updateStats();
                
                loadingEl.style.display = 'none';
                tableEl.style.display = 'table';
                document.getElementById('updateTime').innerText = new Date().toLocaleString();
                
            } catch (error) {
                console.error('Ошибка:', error);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.innerHTML = `❌ Ошибка: ${error.message}<br><br>Откройте консоль (F12) для деталей.`;
            } finally {
                isLoading = false;
            }
        }
        
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = players;
            
            if (searchTerm) {
                filtered = players.filter(p => p.name.toLowerCase().includes(searchTerm));
            }
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            for (let i = 0; i < filtered.length; i++) {
                const player = filtered[i];
                const row = tbody.insertRow();
                let rankClass = '';
                if (i === 0) rankClass = 'rank-1';
                else if (i === 1) rankClass = 'rank-2';
                else if (i === 2) rankClass = 'rank-3';
                
                row.innerHTML = `
                    <td class="${rankClass}" style="text-align:center; font-weight:bold;">${i+1}</td>
                    <td style="font-weight:500;">${escapeHtml(player.name)}</td>
                    <td style="font-weight:bold; color:#667eea;">${player.score}</td>
                `;
            }
        }
        
        function updateStats() {
            document.getElementById('totalPlayers').innerText = players.length;
            document.getElementById('topScore').innerText = players.length > 0 ? players[0].score : 0;
            const avgScore = players.length > 0 ? (players.reduce((a,b) => a + b.score, 0) / players.length).toFixed(1) : 0;
            document.getElementById('avgScore').innerText = avgScore;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', () => renderTable());
        
        loadData();
    </script>
</body>
</html>
