<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillaz — Рейтинг гильдии</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Анимация пульсации для фона */
        @keyframes pulse {
            0% { opacity: 0.4; text-shadow: 0 0 5px #667eea; }
            50% { opacity: 0.7; text-shadow: 0 0 20px #667eea, 0 0 30px #764ba2; }
            100% { opacity: 0.4; text-shadow: 0 0 5px #667eea; }
        }

        /* Анимация свечения для карточек */
        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(102, 126, 234, 0.3); border-color: rgba(102, 126, 234, 0.3); }
            100% { box-shadow: 0 0 25px rgba(102, 126, 234, 0.6); border-color: rgba(102, 126, 234, 0.8); }
        }

        /* Анимация появления строк таблицы */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Анимация движения фона */
        @keyframes gradientBG {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3a, #0f0f2f, #1a1a4a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        /* Анимированные частицы фона */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(102,126,234,0.4), transparent);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            to { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Заголовок с неоновым эффектом */
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #667eea, 0 0 20px #667eea, 0 0 30px #667eea, 0 0 40px #764ba2;
            animation: pulse 3s infinite;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            color: #ccc;
            text-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        /* Поиск с неоновой рамкой */
        .controls {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }

        .controls:hover {
            border-color: #667eea;
            animation: glow 0.5s ease-in-out;
        }

        .search-box input {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            border: none;
            border-radius: 40px;
            transition: all 0.3s;
            background: rgba(255,255,255,0.9);
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 0 20px #667eea;
            transform: scale(1.01);
        }

        /* Статистика — карточки с эффектом стекла */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 20px;
            flex: 1;
            min-width: 140px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            border-color: #667eea;
            animation: glow 0.5s ease-in-out;
        }

        .stat-card h3 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(102,126,234,0.3);
        }

        .stat-card p {
            color: #ccc;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* Таблица с эффектом стекла */
        .table-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
        }

        .table-container:hover {
            border-color: rgba(102, 126, 234, 0.6);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1rem;
        }

        td {
            padding: 14px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #eee;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            font-size: 0.95rem;
        }

        /* Анимация строк с задержкой */
        tr:nth-child(1) td { animation-delay: 0.05s; }
        tr:nth-child(2) td { animation-delay: 0.1s; }
        tr:nth-child(3) td { animation-delay: 0.15s; }
        tr:nth-child(4) td { animation-delay: 0.2s; }
        tr:nth-child(5) td { animation-delay: 0.25s; }
        tr:nth-child(6) td { animation-delay: 0.3s; }
        tr:nth-child(7) td { animation-delay: 0.35s; }
        tr:nth-child(8) td { animation-delay: 0.4s; }
        tr:nth-child(9) td { animation-delay: 0.45s; }
        tr:nth-child(10) td { animation-delay: 0.5s; }

        tr:hover {
            background: rgba(102, 126, 234, 0.15);
        }

        /* Ранги с неоновыми цветами */
        .rank-1 {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            color: #1a1a2a;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
            font-size: 1.1rem;
        }
        .rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #a8a8a8);
            color: #1a1a2a;
            font-weight: bold;
        }
        .rank-3 {
            background: linear-gradient(135deg, #cd7f32, #b86b2a);
            color: white;
            font-weight: bold;
        }

        .loading, .error {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.2rem;
        }

        .error {
            color: #ff6b6b;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #aaa;
            opacity: 0.8;
            font-size: 0.85rem;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 0.9rem;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .header h1 { font-size: 2rem; }
            th, td { padding: 10px 8px; font-size: 11px; }
            .stat-card h3 { font-size: 1.8rem; }
            .stat-card p { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <!-- Анимированные частицы фона -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="header">
            <h1>🎮 GORILLAZ — РЕЙТИНГ ГИЛЬДИИ</h1>
            <p>Система подсчёта баллов • Обновляется автоматически</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск игрока...">
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3 id="totalPlayers">—</h3><p>Всего игроков</p></div>
            <div class="stat-card"><h3 id="topScore">—</h3><p>Максимум баллов</p></div>
            <div class="stat-card"><h3 id="avgScore">—</h3><p>Средний балл</p></div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">🔄 Загрузка данных...</div>
            <div id="errorMsg" class="error" style="display:none;"></div>
            <table id="ratingTable" style="display: none;">
                <thead>
                    <tr>
                        <th>🏆 Место</th>
                        <th>👤 Игрок</th>
                        <th>⭐ Баллы</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            📅 Последнее обновление: <span id="updateTime">—</span>
            <br>
            <button onclick="loadData()">🔄 Обновить вручную</button>
        </div>
    </div>

    <script>
        // ============================================
        // НАСТРОЙКИ (ЗАМЕНИ НА СВОИ)
        // ============================================
        const SHEET_ID = '1S1RiKUiEcYbcax5nhWeA13_GNgh_6hstL1ebZhx6o1k';
        
        // Список листов для загрузки
        const SHEETS = [
            { name: 'SpiderPoints', nameCol: 0, addCol: 1, subtractCol: 2 },
            { name: 'Кта', nameCol: 0, addCol: 1, subtractCol: 2 },
            { name: 'Ава пэпэ', nameCol: 0, addCol: 1, subtractCol: 2 },
            { name: 'Прочее', nameCol: 0, addCol: 1, subtractCol: 2 }
        ];
        
        let players = [];
        
        // ============================================
        // СОЗДАНИЕ ЧАСТИЦ
        // ============================================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 12 + 6 + 's';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                container.appendChild(particle);
            }
        }
        
        // ============================================
        // ЗАГРУЗКА ДАННЫХ С ЛИСТА
        // ============================================
        async function loadSheetData(sheet) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet.name)}`;
            console.log(`Загрузка листа ${sheet.name}:`, url);
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    console.warn(`Лист ${sheet.name} не загружен: HTTP ${response.status}`);
                    return {};
                }
                
                const csvText = await response.text();
                if (csvText.includes('<!DOCTYPE') || csvText.includes('/*O_o*/') || csvText.length < 50) {
                    console.warn(`Лист ${sheet.name} не опубликован или пуст`);
                    return {};
                }
                
                const lines = csvText.split('\n');
                if (lines.length < 2) return {};
                
                const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
                const playerScores = {};
                
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    
                    // Парсим CSV строку
                    const cells = [];
                    let current = '';
                    let inQuotes = false;
                    
                    for (let j = 0; j < line.length; j++) {
                        const char = line[j];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            cells.push(current.replace(/^"|"$/g, '').trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    cells.push(current.replace(/^"|"$/g, '').trim());
                    
                    const name = cells[sheet.nameCol];
                    const add = parseFloat(cells[sheet.addCol]);
                    const subtract = parseFloat(cells[sheet.subtractCol]);
                    
                    if (name && name !== '' && name !== headers[sheet.nameCol] && name !== 'Ник игрока') {
                        let change = 0;
                        if (!isNaN(add)) change += add;
                        if (!isNaN(subtract)) change -= subtract;
                        
                        playerScores[name] = (playerScores[name] || 0) + change;
                    }
                }
                
                console.log(`Лист ${sheet.name}: найдено ${Object.keys(playerScores).length} игроков`);
                return playerScores;
                
            } catch (error) {
                console.warn(`Ошибка загрузки листа ${sheet.name}:`, error.message);
                return {};
            }
        }
        
        // ============================================
        // ОСНОВНАЯ ФУНКЦИЯ ЗАГРУЗКИ
        // ============================================
        async function loadData() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('ratingTable');
            const errorMsg = document.getElementById('errorMsg');
            
            loading.style.display = 'block';
            loading.innerHTML = '🔄 Загрузка данных со всех листов...';
            table.style.display = 'none';
            errorMsg.style.display = 'none';
            
            try {
                // Загружаем данные со всех листов
                const allScores = {};
                
                for (const sheet of SHEETS) {
                    const sheetScores = await loadSheetData(sheet);
                    for (const [name, score] of Object.entries(sheetScores)) {
                        allScores[name] = (allScores[name] || 0) + score;
                    }
                }
                
                players = Object.entries(allScores).map(([n, s]) => ({ name: n, score: s }));
                players.sort((a, b) => b.score - a.score);
                
                console.log('Всего игроков:', players.length);
                
                if (players.length === 0) {
                    throw new Error('Нет данных. Проверьте, что листы опубликованы и содержат данные');
                }
                
                renderTable();
                updateStats();
                
                loading.style.display = 'none';
                table.style.display = 'table';
                document.getElementById('updateTime').innerText = new Date().toLocaleString();
                
            } catch (error) {
                console.error('Ошибка:', error);
                loading.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = `
                    ❌ Ошибка: ${error.message}<br><br>
                    <strong>Сделайте следующее:</strong><br><br>
                    1️⃣ Откройте <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank">вашу таблицу</a><br>
                    2️⃣ Нажмите <strong>синюю кнопку "Настройки доступа"</strong><br>
                    3️⃣ Выберите <strong>"Все, у кого есть ссылка"</strong><br>
                    4️⃣ Нажмите <strong>"Готово"</strong><br>
                    5️⃣ <strong>Файл → Опубликовать в интернете</strong><br>
                    6️⃣ Опубликуйте <strong>каждый лист</strong> (SpiderPoints, Кта, Ава пэпэ, Прочее) в формате CSV<br>
                    7️⃣ Обновите эту страницу через 1 минуту
                `;
            }
        }
        
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = searchTerm ? players.filter(p => p.name.toLowerCase().includes(searchTerm)) : players;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            for (let i = 0; i < filtered.length; i++) {
                const p = filtered[i];
                const row = tbody.insertRow();
                let rankClass = '';
                if (i === 0) rankClass = 'rank-1';
                else if (i === 1) rankClass = 'rank-2';
                else if (i === 2) rankClass = 'rank-3';
                
                row.innerHTML = `
                    <td class="${rankClass}" style="text-align:center; font-weight:bold;">${i+1}</td>
                    <td style="font-weight:500;">${escapeHtml(p.name)}</td>
                    <td style="font-weight:bold; color:#667eea;">${p.score}</td>
                `;
            }
        }
        
        function updateStats() {
            document.getElementById('totalPlayers').innerText = players.length;
            document.getElementById('topScore').innerText = players[0]?.score || 0;
            const avg = players.length ? (players.reduce((a,b) => a + b.score, 0) / players.length).toFixed(1) : 0;
            document.getElementById('avgScore').innerText = avg;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', () => renderTable());
        
        // Запуск
        createParticles();
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
