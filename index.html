<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorillaz — Рейтинг гильдии</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.85;
        }

        .controls {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            min-width: 140px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .table-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9ff;
        }

        .rank-1 {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            color: #333;
            font-weight: bold;
        }
        .rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #a8a8a8);
            color: #333;
            font-weight: bold;
        }
        .rank-3 {
            background: linear-gradient(135deg, #cd7f32, #b86b2a);
            color: white;
            font-weight: bold;
        }

        .loading, .error {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2rem;
        }
        .error { color: #ff6b6b; }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            opacity: 0.7;
            font-size: 0.85rem;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 GORILLAZ — Рейтинг гильдии</h1>
            <p>Система подсчёта баллов</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск игрока...">
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3 id="totalPlayers">—</h3><p>Всего игроков</p></div>
            <div class="stat-card"><h3 id="topScore">—</h3><p>Максимум баллов</p></div>
            <div class="stat-card"><h3 id="avgScore">—</h3><p>Средний балл</p></div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">🔄 Загрузка данных...</div>
            <div id="errorMessage" class="error" style="display:none;"></div>
            <table id="ratingTable" style="display: none;">
                <thead>
                    <tr>
                        <th>🏆 Место</th>
                        <th>👤 Игрок</th>
                        <th>⭐ Баллы</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer">
            📅 Последнее обновление: <span id="updateTime">—</span><br>
            <button onclick="loadData()">🔄 Обновить вручную</button>
        </div>
    </div>

    <script>
        // ⚠️ ВАШ ID ТАБЛИЦЫ
        const SPREADSHEET_ID = '11G7D8K9N8HqHJ0l6uLzzzbQCeUrG1FmS9trZ5Blp7n4';
        
        // Используем разные источники для обхода CORS
        let currentProxy = 0;
        const PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://cors-anywhere.herokuapp.com/'
        ];
        
        async function fetchWithProxy(url, proxyIndex) {
            const proxyUrl = PROXIES[proxyIndex] + encodeURIComponent(url);
            console.log(`Попытка ${proxyIndex + 1}:`, proxyUrl);
            
            const response = await fetch(proxyUrl);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response;
        }
        
        async function loadData() {
            const loadingEl = document.getElementById('loading');
            const tableEl = document.getElementById('ratingTable');
            const errorEl = document.getElementById('errorMessage');
            
            loadingEl.style.display = 'block';
            loadingEl.innerHTML = '🔄 Загрузка данных...';
            tableEl.style.display = 'none';
            errorEl.style.display = 'none';
            
            // Пробуем загрузить данные напрямую (без прокси) сначала
            const directUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=SpiderPoints`;
            
            try {
                // Пробуем прямой запрос
                console.log('Пробуем прямой запрос...');
                const directResponse = await fetch(directUrl);
                
                if (directResponse.ok) {
                    const text = await directResponse.text();
                    const jsonText = text.substring(47, text.length - 2);
                    const data = JSON.parse(jsonText);
                    
                    if (data.table && data.table.rows) {
                        processData(data.table);
                        loadingEl.style.display = 'none';
                        tableEl.style.display = 'table';
                        document.getElementById('updateTime').innerText = new Date().toLocaleString();
                        return;
                    }
                }
            } catch (e) {
                console.log('Прямой запрос не удался:', e.message);
            }
            
            // Если прямой запрос не сработал, пробуем CSV через прокси
            const csvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;
            
            for (let i = 0; i < PROXIES.length; i++) {
                try {
                    const response = await fetchWithProxy(csvUrl, i);
                    const csvText = await response.text();
                    
                    if (csvText && csvText.length > 100) {
                        processCSV(csvText);
                        loadingEl.style.display = 'none';
                        tableEl.style.display = 'table';
                        document.getElementById('updateTime').innerText = new Date().toLocaleString();
                        return;
                    }
                } catch (e) {
                    console.log(`Прокси ${i + 1} не сработал:`, e.message);
                }
            }
            
            // Если ничего не сработало, показываем ошибку
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.innerHTML = `
                ❌ Не удалось загрузить данные.<br><br>
                <strong>Пожалуйста, выполните эти шаги:</strong><br><br>
                1. Откройте вашу Google Таблицу<br>
                2. Нажмите <strong>Файл → Опубликовать в интернете</strong><br>
                3. Нажмите кнопку <strong>"Опубликовать"</strong><br>
                4. Скопируйте ссылку и убедитесь, что она начинается с https://docs.google.com/...<br>
                5. Обновите эту страницу через 1-2 минуты<br><br>
                <button onclick="location.reload()">🔄 Обновить страницу</button>
            `;
        }
        
        function processData(table) {
            const rows = table.rows;
            const cols = table.cols;
            
            let nameCol = -1;
            let scoreCol = -1;
            
            for (let i = 0; i < cols.length; i++) {
                const label = cols[i].label;
                if (label === 'Игрок' || label === '🏆 Игрок' || label === 'Ник игрока') {
                    nameCol = i;
                }
                if (label === 'Баллы' || label === '⭐ Баллы') {
                    scoreCol = i;
                }
            }
            
            if (nameCol === -1 || scoreCol === -1) {
                // Если не нашли, пробуем по позиции (колонки G и H)
                if (cols.length > 6 && cols[6].label === 'Игрок') nameCol = 6;
                if (cols.length > 7 && cols[7].label === 'Баллы') scoreCol = 7;
            }
            
            if (nameCol === -1 || scoreCol === -1) {
                throw new Error('Колонки не найдены');
            }
            
            const playersMap = new Map();
            
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (row.c && row.c[nameCol] && row.c[scoreCol]) {
                    const name = row.c[nameCol].v;
                    let score = parseFloat(row.c[scoreCol].v);
                    
                    if (name && !isNaN(score) && name !== 'Игрок' && name !== '🏆 Игрок') {
                        if (playersMap.has(name)) {
                            playersMap.set(name, playersMap.get(name) + score);
                        } else {
                            playersMap.set(name, score);
                        }
                    }
                }
            }
            
            displayPlayers(playersMap);
        }
        
        function processCSV(csvText) {
            const lines = csvText.split('\n');
            if (lines.length < 2) {
                throw new Error('CSV пуст');
            }
            
            const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
            
            let nameCol = -1;
            let scoreCol = -1;
            
            for (let i = 0; i < headers.length; i++) {
                const h = headers[i];
                if (h === 'Игрок' || h === 'Ник игрока' || h === '🏆 Игрок') {
                    nameCol = i;
                }
                if (h === 'Баллы' || h === '⭐ Баллы') {
                    scoreCol = i;
                }
            }
            
            // Если не нашли, пробуем по позиции (колонки G и H это 6 и 7)
            if (nameCol === -1 && headers.length > 6 && headers[6] === 'Игрок') nameCol = 6;
            if (scoreCol === -1 && headers.length > 7 && headers[7] === 'Баллы') scoreCol = 7;
            
            if (nameCol === -1 || scoreCol === -1) {
                throw new Error(`Колонки не найдены. Заголовки: ${headers.join(', ')}`);
            }
            
            const playersMap = new Map();
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                // Парсим CSV
                const row = [];
                let inQuote = false;
                let current = '';
                const line = lines[i];
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuote = !inQuote;
                    } else if (char === ',' && !inQuote) {
                        row.push(current.replace(/^"|"$/g, '').trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                row.push(current.replace(/^"|"$/g, '').trim());
                
                const name = row[nameCol];
                const score = parseFloat(row[scoreCol]);
                
                if (name && !isNaN(score) && name !== 'Игрок' && name !== '🏆 Игрок' && name !== 'Ник игрока') {
                    if (playersMap.has(name)) {
                        playersMap.set(name, playersMap.get(name) + score);
                    } else {
                        playersMap.set(name, score);
                    }
                }
            }
            
            displayPlayers(playersMap);
        }
        
        function displayPlayers(playersMap) {
            if (playersMap.size === 0) {
                throw new Error('Нет данных об игроках');
            }
            
            const players = Array.from(playersMap.entries()).map(([name, score]) => ({ name, score }));
            players.sort((a, b) => b.score - a.score);
            
            renderTable(players);
            updateStats(players);
        }
        
        function renderTable(players) {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = players;
            
            if (searchTerm) {
                filtered = players.filter(p => p.name.toLowerCase().includes(searchTerm));
            }
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            for (let i = 0; i < filtered.length; i++) {
                const player = filtered[i];
                const row = tbody.insertRow();
                let rankClass = '';
                if (i === 0) rankClass = 'rank-1';
                else if (i === 1) rankClass = 'rank-2';
                else if (i === 2) rankClass = 'rank-3';
                
                row.innerHTML = `
                    <td class="${rankClass}" style="text-align:center; font-weight:bold;">${i+1}</td>
                    <td style="font-weight:500;">${escapeHtml(player.name)}</td>
                    <td style="font-weight:bold; color:#667eea;">${player.score}</td>
                `;
            }
        }
        
        function updateStats(players) {
            document.getElementById('totalPlayers').innerText = players.length;
            document.getElementById('topScore').innerText = players.length > 0 ? players[0].score : 0;
            const avgScore = players.length > 0 ? (players.reduce((a,b) => a + b.score, 0) / players.length).toFixed(1) : 0;
            document.getElementById('avgScore').innerText = avgScore;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', () => {
            // Нужно перерисовать таблицу с текущими данными
            // Для этого сохраним последние данные в переменную
            if (window.lastPlayers) {
                renderTable(window.lastPlayers);
            }
        });
        
        // Сохраняем последние данные для поиска
        let originalRenderTable = renderTable;
        window.renderTableOriginal = renderTable;
        
        // Загружаем данные
        loadData();
    </script>
</body>
</html>
